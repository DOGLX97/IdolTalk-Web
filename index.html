<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IdolTalk Web Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f9; color: #2d3436; }
        .thai-font { font-family: 'Noto Sans Thai', sans-serif; }
        .kr-font { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md space-y-5">
        <!-- Header -->
        <header class="text-center py-4">
            <h1 class="text-3xl font-black text-gray-800 tracking-tight">IdolTalk</h1>
            <p class="text-purple-500 text-xs font-bold tracking-widest uppercase mt-1">Fansign AI Coach</p>
        </header>

        <!-- API Key 设置区 -->
        <div id="setupSection" class="bg-white p-5 rounded-3xl shadow-sm border border-purple-50">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-sm font-bold text-gray-700">设置 API Key</h2>
                <span id="statusBadge" class="text-[10px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-400">未设置</span>
            </div>
            <div class="flex gap-2">
                <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key (sk-...)" 
                       class="flex-1 p-3 bg-gray-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-purple-400 transition-all">
                <button onclick="saveKey()" class="bg-gray-800 text-white px-4 rounded-2xl text-sm font-bold active:scale-95 transition-all">保存</button>
            </div>
        </div>

        <!-- 语种切换 -->
        <div class="flex bg-gray-200 rounded-2xl p-1.5">
            <button onclick="switchLang('thai')" id="btnThai" class="flex-1 py-2.5 rounded-xl text-sm font-black bg-white shadow-sm transition-all">🇹🇭 泰语</button>
            <button onclick="switchLang('korean')" id="btnKorean" class="flex-1 py-2.5 rounded-xl text-sm font-black text-gray-400 transition-all">🇰🇷 韩语</button>
        </div>

        <!-- 输入区域 -->
        <div class="relative bg-white rounded-3xl p-5 shadow-sm border border-gray-50">
            <textarea id="userInput" rows="4" maxlength="500" 
                      class="w-full bg-transparent outline-none text-gray-700 placeholder-gray-300 resize-none text-base"
                      placeholder="请输入你想对爱豆说的话..."></textarea>
            <div id="charCount" class="text-right text-[10px] text-gray-300 mt-2 font-mono">0/500</div>
        </div>

        <!-- 生成按钮 -->
        <button id="genBtn" onclick="generate()" class="w-full bg-gradient-to-r from-purple-500 to-indigo-600 text-white font-black py-4 rounded-3xl shadow-xl transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
            <i class="fa-solid fa-sparkles"></i>
            <span>AI 实时生成训练卡片</span>
        </button>

        <!-- 结果展示区 -->
        <div id="cardContainer" class="hidden flex flex-col items-center py-4 space-y-8">
            <div id="fansignCard" class="w-[335px] bg-white p-8 rounded-[40px] shadow-2xl relative overflow-hidden border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <span id="cardTitle" class="text-purple-500 text-[11px] font-black tracking-widest uppercase">🇹🇭 泰语签售训练卡</span>
                    <i class="fa-solid fa-sparkles text-orange-300"></i>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">中文原意</p>
                        <p id="resChinese" class="text-sm font-bold text-gray-700"></p>
                    </div>
                    <div>
                        <p id="langLabel" class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">泰语原文</p>
                        <p id="resTranslated" class="text-2xl font-black text-gray-800 leading-tight"></p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">中文谐音 (跟着读)</p>
                        <p id="resPhonetic" class="text-xl font-black text-red-500"></p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">English Meaning</p>
                        <p id="resEnglish" class="text-[12px] text-gray-600 font-medium"></p>
                    </div>
                    <div class="pt-2 border-t border-dashed border-gray-100">
                        <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-1">语气与建议</p>
                        <p id="resTone" class="text-[13px] text-gray-400 font-medium leading-relaxed"></p>
                    </div>
                </div>
                <div class="mt-8 text-center"><p class="text-[9px] text-gray-200 font-bold tracking-widest uppercase">IdolTalk - fighting ✨</p></div>
            </div>

            <!-- 操作按钮 -->
            <div class="flex gap-12">
                <button onclick="speak()" class="flex flex-col items-center gap-2">
                    <div class="w-16 h-16 bg-purple-100 text-purple-600 rounded-3xl flex items-center justify-center active:scale-90 transition-all shadow-sm">
                        <i class="fa-solid fa-volume-high text-xl"></i>
                    </div>
                    <span class="text-[11px] font-black text-purple-400">听发音</span>
                </button>
                <button onclick="saveImage()" class="flex flex-col items-center gap-2">
                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-3xl flex items-center justify-center active:scale-90 transition-all shadow-sm">
                        <i class="fa-solid fa-cloud-arrow-down text-xl"></i>
                    </div>
                    <span class="text-[11px] font-black text-green-400">存相册</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'thai';
        const langConfig = {
            thai: { name: '泰语', flag: '🇹🇭', code: 'th-TH', fontClass: 'thai-font' },
            korean: { name: '韩语', flag: '🇰🇷', code: 'ko-KR', fontClass: 'kr-font' }
        };

        window.onload = () => {
            const savedKey = localStorage.getItem('idoltalk_key');
            if (savedKey) { document.getElementById('apiKeyInput').value = savedKey; updateStatus(true); }
        };

        function saveKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key.startsWith('sk-')) { localStorage.setItem('idoltalk_key', key); updateStatus(true); alert('保存成功！'); }
            else { alert('Key 格式不正确'); }
        }

        function updateStatus(isSet) {
            const badge = document.getElementById('statusBadge');
            badge.innerText = isSet ? '已就绪' : '未设置';
            badge.className = isSet ? 'text-[10px] px-2 py-0.5 rounded-full bg-green-100 text-green-600 font-bold' : 'text-[10px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-400';
        }

        function switchLang(lang) {
            currentLang = lang;
            const isThai = lang === 'thai';
            document.getElementById('btnThai').className = isThai ? 'flex-1 py-2.5 rounded-xl text-sm font-black bg-white shadow-sm transition-all' : 'flex-1 py-2.5 rounded-xl text-sm font-black text-gray-400 transition-all';
            document.getElementById('btnKorean').className = !isThai ? 'flex-1 py-2.5 rounded-xl text-sm font-black bg-white shadow-sm transition-all' : 'flex-1 py-2.5 rounded-xl text-sm font-black text-gray-400 transition-all';
        }

        async function generate() {
            const text = document.getElementById('userInput').value.trim();
            const key = localStorage.getItem('idoltalk_key');
            if (!key || !text) return alert('请检查 Key 和输入内容');

            const btn = document.getElementById('genBtn');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> <span>正在构思地道表达...</span>`;

            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            {role: "system", content: `You are a professional fansign coach. You translate Chinese into ONLY ${langConfig[currentLang].name}. Never output Thai when Korean is requested.`},
                            {role: "user", content: `将这段中文翻译成地道的${langConfig[currentLang].name}: "${text}"。必须严格返回JSON: {"translated": "原文", "phonetic": "汉字谐音", "english": "英文注释", "tone": "语气建议"}`}
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                document.getElementById('resChinese').innerText = text;
                const resTextElement = document.getElementById('resTranslated');
                resTextElement.innerText = result.translated;
                resTextElement.className = `text-2xl font-black text-gray-800 leading-tight ${langConfig[currentLang].fontClass}`;
                
                document.getElementById('resPhonetic').innerText = result.phonetic;
                document.getElementById('resEnglish').innerText = result.english;
                document.getElementById('resTone').innerText = result.tone;
                document.getElementById('cardTitle').innerText = `${langConfig[currentLang].flag} ${langConfig[currentLang].name}签售训练卡`;
                document.getElementById('langLabel').innerText = `${langConfig[currentLang].name}原文`;

                document.getElementById('cardContainer').classList.remove('hidden');
                document.getElementById('cardContainer').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                alert('解析出错，请重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }

        function speak() {
            const text = document.getElementById('resTranslated').innerText;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = langConfig[currentLang].code;
            window.speechSynthesis.speak(ut);
        }

        function saveImage() {
            html2canvas(document.getElementById('fansignCard'), { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `IdolTalk-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        document.getElementById('userInput').oninput = function() {
            document.getElementById('charCount').innerText = `${this.value.length}/500`;
        };
    </script>
</body>
</html>
